name: Release

# This repo supplies package-specific release gates. The reusable Sylphx workflow
# owns changesets/action version PR handling, npm publish orchestration, OIDC
# posture, and provenance/attestation evidence expectations. postpublish runs
# release:readback for npm registry readback through Bun.

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  actions: write
  contents: write
  id-token: write
  pull-requests: write

jobs:
  preflight:
    name: release:preflight
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Python benchmark dependencies
        run: python -m pip install -r bench/python-parity/requirements.txt

      - name: Run release preflight
        run: bun run release:preflight

  release:
    needs: preflight
    uses: SylphxAI/.github/.github/workflows/release.yml@main
    with:
      build: bun run build
      postpublish: bun run release:readback
    secrets: inherit
