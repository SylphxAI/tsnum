name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

jobs:
  validate:
    name: Build, test, and benchmark
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Python benchmark dependencies
        run: python -m pip install -r bench/python-parity/requirements.txt

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Python parity benchmark
        run: bun run bench:python-parity

      - name: Native dispatch probe
        run: bun run bench:native-dispatch

      - name: Python parity report freshness
        run: bun run bench:python-parity:report:check

      - name: Upload Python parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-parity-report
          path: |
            bench/python-parity/results/latest.json
            bench/python-parity/results/latest.md
          if-no-files-found: ignore

      - name: Upload native dispatch report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-dispatch-report
          path: |
            bench/python-parity/results/native-dispatch-latest.json
            bench/python-parity/results/native-dispatch-latest.md
          if-no-files-found: ignore
